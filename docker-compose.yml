services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    volumes:
      - recordings_data:/data/recordings
    env_file: .env
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  recordings_data:
